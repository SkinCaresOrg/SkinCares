services:
  - type: web
    name: skincares-api
    env: python
    plan: free
    buildCommand: pip install -e .[api]
    startCommand: uvicorn deployment.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    autoDeploy: true
    envVars:
      - key: CORS_ALLOW_ORIGINS
        value: https://skinscares.es,https://www.skinscares.es
