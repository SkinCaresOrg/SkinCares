repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-pre-push
        name: pytest (pre-push)
        entry: python -m pytest tests --disable-warnings --maxfail=1
        language: system
        pass_filenames: false
        stages: [pre-push]
